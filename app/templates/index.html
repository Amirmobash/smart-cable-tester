<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ config.project_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Raspberry Pi Cable Tester</p>
        <h1>{{ config.project_name }}</h1>
        <p class="sub">Orange / White redesign with live cable status</p>
      </div>
      <div class="author-card">
        <span>Metadata Author</span>
        <strong>{{ config.author }}</strong>
      </div>
    </header>

    <section class="summary-grid">
      <div class="summary-card">
        <span class="label">Overall Status</span>
        <strong id="overall-status">Loading...</strong>
      </div>
      <div class="summary-card">
        <span class="label">Timestamp</span>
        <strong id="timestamp">-</strong>
      </div>
      <div class="summary-card">
        <span class="label">GPIO Backend</span>
        <strong id="backend">-</strong>
      </div>
    </section>

    <section class="table-card">
      <div class="table-head">
        <h2>Channel Map</h2>
        <span class="badge">Orange / White Theme</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Channel</th>
            <th>Conn1 Pin</th>
            <th>Conn2 Pin</th>
            <th>Conn3 Pin</th>
            <th>Conn2</th>
            <th>Conn3</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="channels-body"></tbody>
      </table>
    </section>
  </div>

  <script>
    async function loadStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();

      document.getElementById('overall-status').textContent = data.overall_ok ? 'PASS' : 'FAIL';
      document.getElementById('overall-status').className = data.overall_ok ? 'pass' : 'fail';
      document.getElementById('timestamp').textContent = data.timestamp || '-';
      document.getElementById('backend').textContent = data.using_mock_gpio ? 'MockGPIO' : 'RPi.GPIO';

      const tbody = document.getElementById('channels-body');
      tbody.innerHTML = '';

      for (const ch of data.channels || []) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${ch.channel}</td>
          <td>${ch.connector_1_pin}</td>
          <td>${ch.connector_2_pin}</td>
          <td>${ch.connector_3_pin}</td>
          <td><span class="pill ${ch.connector_2_ok ? 'ok' : 'bad'}">${ch.connector_2_ok ? 'OK' : 'ERR'}</span></td>
          <td><span class="pill ${ch.connector_3_ok ? 'ok' : 'bad'}">${ch.connector_3_ok ? 'OK' : 'ERR'}</span></td>
          <td><span class="pill ${ch.passed ? 'ok' : 'bad'}">${ch.passed ? 'PASS' : 'FAIL'}</span></td>
        `;
        tbody.appendChild(tr);
      }
    }

    loadStatus();
    setInterval(loadStatus, 1000);
  </script>
</body>
</html>
